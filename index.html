<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1C2740">
<title>보상관리사 반복학습</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
<div id="root"></div>
<style>
  :root{
    --bg:#E7EBEE; --surface:#FFFFFF; --surface-2:#F3F5F7;
    --ink:#1C2740; --ink-2:#33405C; --muted:#6B7684; --faint:#9AA4AE;
    --line:#D6DBDF; --line-2:#E4E8EB;
    --seal:#B23A3A; --seal-soft:#E8CBC7;
    --correct:#2E7D57; --correct-bg:#E3F1EA;
    --wrong:#C1443C; --wrong-bg:#F7E3E1;
    --gold:#A9791F;
    --b0:#D9DEE2; --b1:#E4B6AF; --b2:#E9CF9C; --b3:#D2DBB4; --b4:#A6C7AC; --b5:#2E7D57;
    --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",Pretendard,"Segoe UI",Roboto,sans-serif;
    --mono:"SF Mono",ui-monospace,"D2Coding",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  #root{max-width:940px;margin:0 auto;padding:22px 18px 64px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* Masthead */
  .mast{display:flex;align-items:center;gap:14px;padding-bottom:18px;border-bottom:2px solid var(--ink);margin-bottom:22px}
  .seal-mark{flex:none;width:46px;height:46px;border:2px solid var(--seal);border-radius:8px;display:grid;place-items:center;color:var(--seal);font-weight:800;font-size:19px;letter-spacing:-1px;transform:rotate(-3deg);position:relative}
  .seal-mark::after{content:"";position:absolute;inset:4px;border:1px solid var(--seal-soft);border-radius:5px}
  .mast h1{font-size:19px;font-weight:800;letter-spacing:-.5px}
  .mast .sub{font-size:12.5px;color:var(--muted);margin-top:2px;letter-spacing:.2px}
  .mast .spacer{flex:1}
  .mast .reset{font-size:12px;color:var(--faint);border:1px solid var(--line);border-radius:7px;padding:6px 10px}
  .mast .reset:hover{color:var(--seal);border-color:var(--seal-soft)}

  .eyebrow{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint)}

  /* Dashboard grid */
  .dash{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}
  @media (max-width:720px){.dash{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px}
  .card.tall{padding:20px}

  /* Cadastral mastery grid */
  .plotwrap{display:flex;flex-direction:column;height:100%}
  .plot-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
  .plot-head .pct{font-size:30px;font-weight:800;letter-spacing:-1px}
  .plot-head .pct small{font-size:14px;color:var(--muted);font-weight:600;margin-left:3px}
  .plots{display:grid;grid-template-columns:repeat(15,1fr);gap:3px}
  .plot{aspect-ratio:1;border-radius:2px;background:var(--b0);position:relative;transition:background .4s ease}
  .plot.new{box-shadow:inset 0 0 0 1px var(--line-2)}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;font-size:11px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:11px;height:11px;border-radius:2px;display:inline-block}

  /* Stat rows */
  .statline{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line-2)}
  .statline:last-child{border-bottom:none}
  .statline .k{font-size:13px;color:var(--muted)}
  .statline .v{font-size:15px;font-weight:700}
  .streak .v{color:var(--seal)}

  .subj-bars{display:flex;flex-direction:column;gap:13px;margin-top:4px}
  .subj{}
  .subj .top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
  .subj .top b{font-weight:700}
  .subj .top .n{color:var(--muted);font-family:var(--mono);font-size:11.5px}
  .track{height:7px;background:var(--surface-2);border-radius:20px;overflow:hidden;border:1px solid var(--line-2)}
  .fill{height:100%;border-radius:20px;transition:width .5s ease}

  /* Mode buttons */
  .modes{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:11px}
  @media (max-width:560px){.modes{grid-template-columns:1fr}}
  .mode{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:15px 16px;transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease}
  .mode:hover{transform:translateY(-2px);border-color:var(--ink-2);box-shadow:0 6px 18px -12px rgba(28,39,64,.5)}
  .mode:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;border-color:var(--line)}
  .mode .mt{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:800;margin-bottom:4px}
  .mode .badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line)}
  .mode .badge.due{background:var(--seal);color:#fff;border-color:var(--seal)}
  .mode .md{font-size:12.5px;color:var(--muted);line-height:1.45}
  .mode.primary{background:var(--ink);border-color:var(--ink)}
  .mode.primary .mt,.mode.primary .md{color:#fff}
  .mode.primary .md{color:#C3CAD6}
  .mode.primary .badge{background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.2)}
  .mode.primary:hover{box-shadow:0 10px 24px -12px rgba(28,39,64,.8)}

  .subpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .chip{font-size:13px;font-weight:600;padding:8px 14px;border-radius:20px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2)}
  .chip:hover{border-color:var(--ink-2)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* Study screen */
  .study-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .back{font-size:13px;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:7px 12px}
  .back:hover{color:var(--ink);border-color:var(--ink-2)}
  .prog{flex:1;height:6px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:20px;overflow:hidden}
  .prog i{display:block;height:100%;background:var(--ink);border-radius:20px;transition:width .35s ease}
  .prog-txt{font-family:var(--mono);font-size:12.5px;color:var(--muted);min-width:44px;text-align:right}

  .qcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px 24px 22px;box-shadow:0 1px 0 var(--line-2)}
  .qmeta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .tag{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.2px}
  .tag.subj{background:var(--ink);color:#fff}
  .tag.origin{background:var(--surface-2);color:var(--muted);border:1px solid var(--line)}
  .tag.diff{font-family:var(--mono);letter-spacing:.2px}
  .tag.diff.d1{background:#EAF0FA;color:#3A5BA0;border:1px solid #CFDDF2}
  .tag.diff.d2{background:#F6EFDD;color:#8A6D1F;border:1px solid #EADFC2}
  .tag.diff.d3{background:#F7E3E1;color:#B23A3A;border:1px solid #E8CBC7}
  .difffilter{display:inline-flex;gap:6px;flex-wrap:wrap}
  .difffilter .df{font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:20px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2)}
  .difffilter .df:hover{border-color:var(--ink-2)}
  .difffilter .df.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .acc-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:none;border:none;padding:0;text-align:left;cursor:pointer}
  .acc-head:hover .chev{color:var(--ink)}
  .acc-right{display:flex;align-items:center;gap:10px}
  .acc-sum{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:600}
  .chev{font-size:13px;color:var(--faint);transition:transform .2s ease;line-height:1}
  .chev.closed{transform:rotate(-90deg)}
  .acc-body{margin-top:13px}
  .boxdots{display:flex;gap:3px;margin-left:auto;align-items:center}
  .boxdots .bl{font-size:10.5px;color:var(--faint);margin-right:4px;letter-spacing:.3px}
  .boxdots i{width:9px;height:9px;border-radius:50%;background:var(--b0);box-shadow:inset 0 0 0 1px var(--line)}
  .boxdots i.on{box-shadow:none}
  .qtext{font-size:17px;line-height:1.6;font-weight:600;color:var(--ink);padding-left:14px;border-left:3px solid var(--seal);margin-bottom:18px;word-break:keep-all}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:12px;align-items:flex-start;text-align:left;background:var(--surface);border:1.5px solid var(--line);border-radius:11px;padding:13px 15px;font-size:14.5px;line-height:1.5;transition:border-color .12s,background .12s;word-break:keep-all}
  .opt:hover:not(:disabled){border-color:var(--ink-2);background:var(--surface-2)}
  .opt:disabled{cursor:default}
  .opt .no{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--muted);margin-top:-1px}
  .opt.correct{border-color:var(--correct);background:var(--correct-bg)}
  .opt.correct .no{background:var(--correct);border-color:var(--correct);color:#fff}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-bg)}
  .opt.wrong .no{background:var(--wrong);border-color:var(--wrong);color:#fff}
  .opt.dim{opacity:.55}

  .verdict{margin-top:18px;padding:15px 16px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line);animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .verdict .vh{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14.5px;margin-bottom:6px}
  .verdict.ok .vh{color:var(--correct)}
  .verdict.no .vh{color:var(--wrong)}
  .verdict .ex{font-size:13.5px;color:var(--ink-2);line-height:1.55;word-break:keep-all}
  .verdict .ex b{color:var(--seal);font-weight:700}

  .actionbar{margin-top:18px;display:flex;gap:10px;align-items:center}
  .btn{font-size:14.5px;font-weight:700;padding:12px 22px;border-radius:11px;background:var(--ink);color:#fff;transition:transform .12s,opacity .12s}
  .btn:hover{transform:translateY(-1px)}
  .btn.ghost{background:var(--surface);color:var(--ink);border:1.5px solid var(--line)}
  .btn.ghost:hover{border-color:var(--ink-2)}
  .kbd-hint{font-size:11.5px;color:var(--faint);margin-left:auto}
  .kbd-hint kbd{font-family:var(--mono);background:var(--surface-2);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:10.5px}

  /* Summary */
  .summary{text-align:center;padding:20px 8px}
  .summary .ring{width:150px;height:150px;margin:6px auto 16px}
  .summary h2{font-size:20px;font-weight:800;margin-bottom:6px}
  .summary .sline{font-size:14px;color:var(--muted);margin-bottom:22px}
  .sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;max-width:440px;margin:0 auto 24px}
  .sbox{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 8px}
  .sbox .n{font-size:24px;font-weight:800}
  .sbox .l{font-size:11.5px;color:var(--muted);margin-top:2px}
  .sbox.up .n{color:var(--correct)}
  .sbox.down .n{color:var(--seal)}

  .empty{text-align:center;padding:40px 16px;color:var(--muted)}
  .empty .big{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:8px}

  .foot{margin-top:26px;font-size:11.5px;color:var(--faint);text-align:center;line-height:1.6}

  /* Top navbar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:2px solid var(--ink);margin-bottom:18px}
  .topbar .logo{display:flex;align-items:center;gap:10px}
  .topbar .logo h1{font-size:17px;font-weight:800;letter-spacing:-.5px}
  .topbar .nav-tabs{display:flex;gap:4px}
  .topbar .nav-tab{font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:8px;color:var(--muted);transition:all .15s}
  .topbar .nav-tab:hover{color:var(--ink);background:var(--surface-2)}
  .topbar .nav-tab.on{color:#fff;background:var(--ink)}
  .topbar .nav-tab .tab-badge{font-family:var(--mono);font-size:10px;margin-left:4px;padding:1px 5px;border-radius:10px;background:var(--seal);color:#fff}

  /* Quick start cards */
  .quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
  @media (max-width:560px){.quick-grid{grid-template-columns:1fr}}
  .quick-card{background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:18px 16px;text-align:center;transition:transform .12s,border-color .12s,box-shadow .12s}
  .quick-card:hover{transform:translateY(-2px);border-color:var(--ink-2);box-shadow:0 6px 18px -12px rgba(28,39,64,.4)}
  .quick-card .qc-icon{font-size:28px;margin-bottom:8px}
  .quick-card .qc-title{font-size:14px;font-weight:800;margin-bottom:4px}
  .quick-card .qc-desc{font-size:11.5px;color:var(--muted);line-height:1.4}
  .quick-card .qc-count{font-family:var(--mono);font-size:20px;font-weight:800;color:var(--seal);margin:6px 0 2px}
  .quick-card.primary{background:var(--ink);border-color:var(--ink)}
  .quick-card.primary .qc-title,.quick-card.primary .qc-count{color:#fff}
  .quick-card.primary .qc-desc{color:#C3CAD6}
  .quick-card.primary:hover{box-shadow:0 8px 20px -10px rgba(28,39,64,.7)}

  /* Diff select main */
  .diff-main{margin-bottom:18px}
  .diff-main .dm-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px}
  .diff-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  @media (max-width:560px){.diff-cards{grid-template-columns:repeat(2,1fr)}}
  .diff-card{background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:14px 10px;text-align:center;transition:all .12s}
  .diff-card:hover{border-color:var(--ink-2)}
  .diff-card.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .diff-card .dc-label{font-size:13px;font-weight:700}
  .diff-card .dc-sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
  .diff-card.on .dc-sub{color:#C3CAD6}

  /* Subject chips row */
  .subj-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .subj-chip{font-size:13px;font-weight:600;padding:8px 16px;border-radius:20px;background:var(--surface);border:1.5px solid var(--line);color:var(--ink-2);transition:all .12s}
  .subj-chip:hover{border-color:var(--ink-2)}

  /* Stat bar compact */
  .stat-compact{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .sc-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
  .sc-item b{font-size:13px;color:var(--ink);font-weight:700}

  /* Toggle switch */
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:14px}
  .toggle-row .tl{display:flex;align-items:center;gap:8px}
  .toggle-row .tl-icon{font-size:18px}
  .toggle-row .tl-text{font-size:13px;font-weight:700}
  .toggle-row .tl-sub{font-size:11px;color:var(--muted)}
  .toggle{position:relative;width:44px;height:24px;flex:none}
  .toggle input{opacity:0;width:0;height:0}
  .toggle .slider{position:absolute;inset:0;background:var(--line);border-radius:24px;cursor:pointer;transition:background .2s}
  .toggle .slider::before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
  .toggle input:checked+.slider{background:var(--correct)}
  .toggle input:checked+.slider::before{transform:translateX(20px)}

  /* Page views */
  .page{display:none}
  .page.active{display:block}
</style>

<script>
/* ============================== QUESTION BANK ==============================
   Source: 2022년도 보상관리사 검정시험 제1차 시험 (제공 PDF) — 정답표 검증분.
   subject: 과목 / o: 원 문항번호 / q: 문제 / opt: 보기 ①~⑤ / a: 정답 index(0~4) / ex: 해설
=========================================================================== */
const BANK = [
/* ---------------- 민법 (물권·등기) 25문 ---------------- */
{id:"m1",subject:"민법",o:1,q:"부동산에 관한 설명 중 틀린 것은? (견해의 대립이 있는 경우 판례에 의함)",opt:[
"토석은 원칙적으로 토지와 분리하여 별도로 거래의 객체가 될 수 없다.",
"건축 중인 건물은 지붕과 기둥과 주벽이 완성되면 토지와 독립한 부동산이 된다.",
"등기하지 않은 수목의 집단도 명인방법을 갖추면 토지와 독립한 부동산이 된다.",
"타인의 토지에 불법 재배한 배추는 토지소유자에게 소유권이 귀속된다.",
"미분리과실은 명인방법을 갖추면 과수와 독립한 물건으로서 거래의 객체로 할 수 있다."],a:3,
ex:"불법 재배라도 <b>농작물은 경작자(재배자)에게 소유권이 귀속</b>된다는 것이 판례입니다. ④가 틀린 지문."},
{id:"m2",subject:"민법",o:2,q:"물권에 관한 설명 중 가장 옳은 것은? (판례에 의함)",opt:[
"물권의 종류와 내용은 법률, 관습법, 조리의 규정에 한정한다.",
"점유권·소유권·유치권은 부동산과 동산을 모두 그 객체로 할 수 있다.",
"일물일권주의에서 1개의 물건이냐는 사회통념이 아니라 물건의 성질에 의한다.",
"모든 부동산물권은 등기하여야 효력이 있다.",
"우리나라는 등기에 공신력을 인정하고 있다."],a:1,
ex:"물권법정주의의 근거는 법률·관습법(조리 ✕), 1개의 물건 여부는 사회통념으로 판단, 상속 등은 등기 없이도 효력 발생, 우리 등기에는 공신력이 없습니다. 옳은 것은 ②."},
{id:"m3",subject:"민법",o:3,q:"부동산물권변동에 관한 설명 중 옳은 것은?",opt:[
"우리 민법은 부동산물권변동에서 대항요건주의를 취한다.",
"상속이 개시된 경우 상속인 명의로 등기된 때에 소유권이 이전된다.",
"형성판결의 확정으로 등기 없이 부동산물권변동이 발생한다.",

{id:"m24",subject:"민법",o:24,q:"약정물권에 해당하지 않는 것은?",opt:["전세권","저당권","양도담보권","유치권","지역권"],a:3,

"이의신청으로 시정을 구할 수 있는 경우에는 민사·행정소송으로 시정을 구할 수 없다."],a:1,
ex:"등기 완료 시 등기필증(등기필정보)은 <b>등기권리자</b>에게 교부·통지합니다. ②가 틀린 지문."},

{id:"r1",subject:"부동산관계법규",o:1,q:"다음 중 도시·군계획에 해당되는 것은?",opt:[
"국토종합계획","부문별계획","지역계획","도종합계획","시군종합계획"],a:4,

{id:"r2",subject:"부동산관계법규",o:2,q:"도시·군관리계획에 관한 설명 중 틀린 것은?",opt:[
"특별시·광역시·특별자치시·특별자치도·시 또는 군의 관할구역을 대상으로 수립한다.",

{id:"r3",subject:"부동산관계법규",o:3,q:"도시·군관리계획의 효력이 발생하는 시기는?",opt:[

{id:"r4",subject:"부동산관계법규",o:4,q:"「국토의 계획 및 이용에 관한 법률」에 의한 용도지역이 아닌 것은?",opt:[

ex:"용도지역은 도시·관리·농림·자연환경보전 4개입니다. <b>공원녹지지역</b>은 용도지역이 아닙니다. 답은 ②."},
{id:"r5",subject:"부동산관계법규",o:5,q:"「국토의 계획 및 이용에 관한 법률」에 의한 용도구역이 아닌 것은?",opt:[

ex:"<b>지구단위계획구역</b>은 용도구역이 아닙니다(별도 제도). 답은 ①."},
{id:"r6",subject:"부동산관계법규",o:6,q:"용도지역·용도지구 및 용도구역에 관한 설명 중 틀린 것은?",opt:[

"용도구역에서의 행위제한의 구체적 내용은 「국토계획법 시행령」에 규정되어 있다."],a:4,
ex:"용도구역의 행위제한은 대체로 개별 특별법·시행령 등에 위임되어 있어, ⑤와 같이 국토계획법 시행령에 일률 규정된다는 표현은 틀립니다. 답은 ⑤."},
{id:"r7",subject:"부동산관계법규",o:7,q:"「국토의 계획 및 이용에 관한 법률」에 의한 개발행위허가 대상이 아닌 것은?",opt:[
"건축물의 건축","토지형질변경","수목의 식재","토지분할","토석의 채취"],a:2,
ex:"개발행위허가 대상: 건축물 건축, 형질변경, 토지분할, 토석채취, 물건 적치 등. <b>수목의 식재</b>는 대상이 아닙니다. 답은 ③."},
{id:"r8",subject:"부동산관계법규",o:8,q:"기반시설의 설치에 관한 설명 중 틀린 것은?",opt:[

"결정 고시일부터 10년이 지날 때까지 사업이 시행되지 않으면 지목이 대(垈)인 토지 소유자는 매수청구를 할 수 있다.",
"결정 고시일부터 20년이 지날 때까지 사업이 시행되지 않으면 그 결정은 실효된다.",
"민간인도 시행자 지정을 받으면 사업을 시행할 수 있다.",

ex:"기반시설이라도 <b>반드시</b> 시설결정을 거쳐야 하는 것은 아닙니다(예외 인정). ①이 틀린 지문."},
{id:"r9",subject:"부동산관계법규",o:9,q:"다음 중 도시·군계획시설사업 시행을 위하여 시행자 지정을 받아야 하는 자는?",opt:[
"국토교통부장관","행정안전부장관","도지사","시장","군수"],a:1,

{id:"r10",subject:"부동산관계법규",o:10,q:"「토지보상법」의 사업인정으로 의제되는 것은?",opt:[
"도시계획위원회의 심의","도시·군계획시설결정의 고시","지형도면 고시","단계별 집행계획의 확정","실시계획인가"],a:4,
ex:"도시·군계획시설사업은 <b>실시계획 인가·고시</b>로 사업인정이 의제됩니다. 답은 ⑤."},
{id:"r11",subject:"부동산관계법규",o:11,q:"「국유재산법」에 관한 설명으로 옳은 것은?",opt:[

"공공용재산은 국가가 직접 사무용·사업용 또는 공무원 주거용으로 사용하거나 5년 내 사용 결정한 재산을 말한다.",
"국유재산을 관리·처분하는 기관을 '관리청'이라 한다.",
"행정재산을 처분하려면 먼저 그 용도를 일반재산으로 전환하여야 한다.",
"국유재산은 시효취득의 대상이 되지 아니한다."],a:3,
ex:"현금은 국유재산 아님, ②는 공용재산 설명, 관리청→중앙관서의 장, 행정재산은 시효취득 불가이나 일반재산은 가능. 옳은 것은 ④(용도폐지 후 처분)."},
{id:"r12",subject:"부동산관계법규",o:12,q:"행정재산의 구분이 아닌 것은?",opt:[
"공용재산","공공용재산","기업용재산","보존용재산","잡종재산"],a:4,
ex:"행정재산은 공용·공공용·기업용·보존용 4종입니다. <b>잡종재산</b>은 (구법) 일반재산으로 행정재산이 아닙니다. 답은 ⑤."},
{id:"r13",subject:"부동산관계법규",o:13,q:"국유재산에 관한 설명 중 틀린 것은?",opt:[
"국유재산은 원칙적으로 대부 및 처분이 금지된다.",
"일반인도 사용허가를 받으면 공공청사에 매점 설치 등 행정재산을 사용할 수 있다.",
"일반재산의 대부는 사법상의 계약으로 본다.",

{id:"r14",subject:"부동산관계법규",o:14,q:"일반재산의 양여는 다음 중 어느 것에 해당하는가?",opt:["매각","대부","교환","증여","관리"],a:3,
ex:"양여는 무상으로 소유권을 넘기는 것으로 <b>증여</b>에 해당합니다. 답은 ④."},
{id:"r15",subject:"부동산관계법규",o:15,q:"일반재산을 처분하는 경우 예정가격 결정에 대한 설명 중 틀린 것은?",opt:[
"증권을 제외한 일반재산은 원칙적으로 감정평가업자의 평가에 의한다.",

"정당한 사유로 점유·개량한 자에게 매각 시 개량비 상당액을 뺀 금액을 매각대금으로 한다.",
"공익사업에 필요한 일반재산을 사업시행자에게 처분하는 경우 취득가액에 의한다.",

ex:"공익사업용 일반재산을 사업시행자에게 처분할 때는 <b>감정평가에 의한 시가(보상액)</b> 기준이지 '취득가액'이 아닙니다. ④가 틀린 지문."},
{id:"r16",subject:"부동산관계법규",o:16,q:"건축법상 '건축'에 관한 설명으로 올바른 것은?",opt:[
"신축: 기존 건축물 일부를 철거하고 종전과 동일 규모 범위에서 다시 축조하는 것",
"개축: 기존 대지에서 건축물 연면적·층수를 증가시키는 것",

"이전: 주요구조부를 해체하지 않고 동일 대지 안 다른 위치로 옮기는 것",

ex:"①은 재축, ②는 증축, ③은 신축, ⑤는 대수선의 정의입니다. 올바른 것은 ④(이전)."},
{id:"r17",subject:"부동산관계법규",o:17,q:"대지면적·건축면적·바닥면적·연면적에 대한 설명 중 가장 부적당한 것은?",opt:[
"대지면적은 대지의 수평투영면적으로 한다.",
"건축면적은 외벽 중심선으로 둘러싸인 부분의 수평투영면적으로 한다.",
"바닥면적은 각 층 벽·기둥 등 구획 중심선으로 둘러싸인 수평투영면적으로 한다.",
"계단탑·옥상 물탱크는 바닥면적에 산입하지 아니한다.",
"연면적은 각 층 바닥면적의 합계로 하며, 지하층 면적은 제외한다."],a:4,

{id:"r18",subject:"부동산관계법규",o:18,q:"대지면적 500㎡ 대지에 각 층 바닥면적 250㎡인 지하1층·지상3층 건축물을 건축할 경우 용적률은?",opt:[
"50퍼센트","100퍼센트","150퍼센트","200퍼센트","250퍼센트"],a:2,

{id:"r19",subject:"부동산관계법규",o:19,q:"건축법령상 건축허가 및 신고에 관한 설명으로 옳지 않은 것은?",opt:[
"건축·대수선은 원칙적으로 허가를 받아야 하나 일정한 경우 신고로 허가를 갈음한다.",

ex:"신고 대상 공장 요건은 대체로 연면적 합계 <b>500㎡ 이하</b> 등으로, ②의 '1,000㎡ 이하'는 옳지 않습니다. 답은 ②."},
{id:"r20",subject:"부동산관계법규",o:20,q:"건축법상 사전결정 통지 시 허가·신고·협의를 한 것으로 보는 사항 중 가장 부적당한 것은?",opt:[
"「도로법」에 의한 도로점용허가",
"「농지법」에 의한 농지전용허가·신고 및 협의",
"「산지관리법」에 의한 산지전용허가 및 산지전용신고",
"「하천법」에 의한 하천점용허가",
"「국토계획법」에 의한 개발행위허가"],a:0,
ex:"사전결정 의제사항에 <b>도로법상 도로점용허가</b>는 포함되지 않습니다. 답은 ①."},
{id:"r21",subject:"부동산관계법규",o:21,q:"일반건축물대장의 기재사항이 아닌 것은?",opt:["대지면적","연면적","바닥면적","건폐율","용적률"],a:2,
ex:"건축물대장에는 대지면적·연면적·건폐율·용적률이 기재되나 <b>바닥면적</b>은 기재사항이 아닙니다. 답은 ③."},
{id:"r22",subject:"부동산관계법규",o:22,q:"다음 중 토지의 이동(異動)이 아닌 것은?",opt:["신규등록","분할","합병","지목변경","축척변경"],a:4,
ex:"축척변경은 도면의 축척을 바꾸는 것으로 토지의 이동(경계·지목 등 변경)에 해당하지 않습니다. 답은 ⑤."},
{id:"r23",subject:"부동산관계법규",o:23,q:"측량·수로조사 및 지적에 관한 법령상 지목에 관한 설명으로 옳지 않은 것은?",opt:[
"벼·연·미나리 등 식물을 주로 재배하는 토지는 '답'이다.",
"댐·저수지·호수·연못 등과 연·왕골 등이 자생하는 토지는 '유지'이다.",
"교회·사찰·향교 등 종교의식용 건축물 부지와 부속시설 부지는 '사적지'이다.",
"인공으로 조성된 수산생물 양식시설 부지는 '양어장'이다.",
"수림지·죽림지 등 산림·원야를 이루는 토지는 '임야'이다."],a:2,
ex:"종교의식용 건축물 부지는 <b>'종교용지'</b>입니다. '사적지'가 아니므로 ③이 옳지 않은 지문."},
{id:"r24",subject:"부동산관계법규",o:24,q:"부동산 공시가격의 설명 중 틀린 것은?",opt:[
"표준지공시지가는 지가정보 제공, 토지거래 지표, 토지보상 가격의 기준이 된다.",
"표준지공시지가 및 개별공시지가는 감정평가사가 개별 토지를 감정평가하는 경우의 기준이 된다.",
"공동주택가격은 과세 등 업무 관련 주택가격 산정의 기준으로 활용할 수 있다.",
"표준주택가격은 개별주택가격 산정의 기준이 된다.",
"개별공시지가는 각종 세금 부과를 위한 지가 산정의 기준이 된다."],a:1,
ex:"감정평가의 기준(비교표준지)이 되는 것은 <b>표준지공시지가</b>이며, '개별공시지가'는 감정평가의 기준이 아닙니다. ②가 틀린 지문."},
{id:"r25",subject:"부동산관계법규",o:25,q:"다음 중 개별공시지가의 결정 주체인 것은?",opt:[
"국토교통부장관","기획재정부장관","행정안전부장관","광역시·도지사","시장·군수·구청장"],a:4,
ex:"개별공시지가는 <b>시장·군수·구청장</b>이 결정·공시합니다(표준지공시지가는 국토부장관). 답은 ⑤."},

/* ---------------- 토지보상법규 25문 ---------------- */
{id:"t1",subject:"토지보상법규",o:1,q:"토지보상법제의 연혁에 관한 설명으로 틀린 것은?",opt:[
"'토지수용령'은 일제가 대륙정복을 위한 철도·항만 등 군용·공공시설 설치를 위해 제정하였다.",
"토지수용령을 폐지하고 강제수용 등을 위하여 '토지수용법'을 제정하였다.",
"토지수용법을 폐지하고 '공공용지의 취득 및 손실보상에 관한 특례법'을 시행하였다.",
"'공공용지의 취득 및 손실보상에 관한 특례법'으로 토지 등을 수용·사용할 수 없었다.",
"'토지보상법'은 토지 등의 수용·사용에 관한 일반법이다."],a:2,
ex:"토지수용법과 공특법은 <b>한동안 병존</b>하다가 2002년 토지보상법으로 통합되었습니다. '폐지하고 시행'했다는 ③이 틀린 지문."},
{id:"t2",subject:"토지보상법규",o:2,q:"헌법 제23조에 대한 설명으로 틀린 것은?",opt:[
"모든 국민의 재산권은 보장된다.",
"그 내용과 한계는 법률로 정한다.",
"재산권의 행사는 공공복리에 적합하도록 하여야 한다.",
"공공필요에 의한 재산권의 수용·사용 및 그에 대한 보상은 토지보상법으로 한다.",
"정당한 보상을 지급하여야 한다."],a:3,
ex:"헌법 제23조 제3항은 수용·사용·보상을 <b>'법률로써'</b> 하도록 규정합니다. '토지보상법으로'라 한 ④가 틀린 지문."},
{id:"t3",subject:"토지보상법규",o:3,q:"사업시행자가 토지·물건 및 권리를 취득·사용하는 경우 「토지보상법」을 적용한다. 다음 중 틀린 것은?",opt:[
"적용대상은 헌법 제23조 제3항의 재산권을 구체적으로 예시하여 규정한 것으로 본다.",
"토지에 속한 흙·돌·모래 또는 자갈은 토지에 속하는 적용대상이다.",
"광업권·어업권 또는 물의 사용에 관한 권리는 적용대상이다.",
"토지와 함께 필요한 입목·건물 등 정착물 및 소유권 외의 권리는 적용대상이다.",
"시행규칙에서 정하지 아니한 대상 물건도 규칙 취지를 객관적으로 판단·평가하여 확대를 허용한다고 해석한다."],a:1,
ex:"흙·돌·모래·자갈은 '토지에 속하는 것'이 아니라 <b>토지와 별개의 독립한 적용대상 권리</b>로 규정됩니다. ②의 '토지에 속하는'이라는 표현이 틀린 지문."},
{id:"t4",subject:"토지보상법규",o:4,q:"토지보상법의 적용에 대한 설명으로 틀린 것은?",opt:[
"공익사업에 한하여 적용된다.",
"공익사업에 필요한 토지 등에 대하여 적용된다.",
"공익사업을 위한 토지 등의 협의(수용) 또는 취득(사용)에 적용된다.",
"공익사업을 위한 토지 등의 사업인정단계에 적용된다.",
"토지 등의 수용·사용을 위한 개별 법률(사업인정의제)의 손실보상에 적용된다."],a:3,
ex:"토지보상법은 사업인정 '단계'에만 적용되는 것이 아니라 취득·사용·손실보상 전 과정에 적용됩니다. '사업인정단계에 적용된다'고 한정한 ④가 틀린 지문."},
{id:"t5",subject:"토지보상법규",o:5,q:"토지 등을 취득·사용할 수 있는 토지보상법 제4조의 공익사업이 아닌 것은?",opt:[
"도로·철도","국민체육시설","석유비축·송유","저수지·배수지","묘지"],a:1,
ex:"제4조 공익사업에 국가·지자체가 설치하는 <b>'국민체육시설'</b>은 열거되어 있지 않습니다(공용·공공용 시설 위주). 답은 ②."},
{id:"t6",subject:"토지보상법규",o:6,q:"「토지보상법령」상 사업인정에 대한 설명으로 옳지 않은 것은?",opt:[
"사업인정은 일정 절차를 조건으로 특정 재산권을 강제 취득할 권한을 부여하는 행정행위이다.",
"토지 등을 수용·사용하려면 사업인정을 받아야 한다.",
"사업인정권자는 관계 중앙행정기관의 장 및 시·도지사와 협의하여야 한다.",
"사업인정이 의제되는 허가·인가·승인권자 등은 지구지정·사업계획승인 등을 하려는 경우 국토교통부장관의 의견을 들어야 한다.",
"협의는 사업인정 전의 필요적 전치 절차는 아니다."],a:3,
ex:"사업인정 의제 시에는 <b>중앙토지수용위원회 및 이해관계인</b>의 의견을 들어야 합니다. '국토교통부장관의 의견'이라 한 ④가 옳지 않은 지문."},
{id:"t7",subject:"토지보상법규",o:7,q:"사업인정에 대하여 틀린 것은?",opt:[
"토지 등을 수용·사용하려면 공익사업 인정을 받아야 한다.",
"사업인정은 특정 재산권의 수용권을 설정하는 처분성 있는 행정행위이다.",
"사업인정은 공공필요가 있는 경우에 한하여 인정되며 공용수용의 본질적 요건이다.",
"사업인정은 고시한 날의 다음날부터 그 효력이 발생한다.",
"사업인정 시 사업시행자·사업종류·사업지역·토지 세목을 관보에 고시하여야 한다."],a:3,
ex:"사업인정은 <b>고시한 날부터</b> 효력이 발생합니다. '다음날부터'라 한 ④가 틀린 지문."},
{id:"t8",subject:"토지보상법규",o:8,q:"「토지보상법」 제82조의 보상협의회의 주요업무가 아닌 것은?",opt:[
"토지소유자나 관계인 등이 요구하는 사항",
"잔여지의 범위 및 이주대책 수립에 관한 사항",
"해당 사업지역 내 공공시설의 이전 등에 관한 사항",
"보상액 평가를 위한 사전 의견수렴에 관한 사항",
"그 밖에 지방자치단체의 장이 회의에 부치는 사항"],a:0,
ex:"보상협의회 협의 사항은 소유자·관계인이 요구하는 사항 중 <b>사업시행자가 필요하다고 인정하는 것</b>에 한합니다. 단순히 '요구하는 사항'이라 한 ①이 주요업무가 아닌 것."},
{id:"t9",subject:"토지보상법규",o:9,q:"「토지보상법령」상 보상협의회의 구성 등에 대한 내용으로 옳지 않은 것은?",opt:[
"사업지구 면적 10만㎡ 이상이거나 토지소유자 50인 이상이면 보상협의회를 의무적으로 두어야 한다.",
"의무적 보상협의회는 해당 사업지역을 관할하는 특별자치도·시·군·구에 설치한다.",
"관할 지자체의 부득이한 사정으로 설치가 곤란하면 사업시행자가 설치하여야 한다.",
"둘 이상 시·군·구에 걸쳐 있고 시장 등 협의가 열람기간 만료 후 30일 내 안 되면 사업시행자가 설치하여야 한다.",
"보상협의회 위원은 해당 지방자치단체의 장이 임명하거나 위촉한다."],a:0,
ex:"의무설치 요건은 면적 10만㎡ 이상<b>이면서(and) 동시에</b> 소유자 50인 이상 등 요건을 갖춘 경우로, '이거나(or)'로 표현한 ①이 옳지 않은 지문입니다."},
{id:"t10",subject:"토지보상법규",o:10,q:"토지나 물건의 인도 또는 이전과 관련된 내용이다. 옳지 않은 것은?",opt:[
"토지소유자·관계인은 수용·사용의 개시일까지 토지를 사업시행자에게 인도하여야 한다.",
"물건의 가격으로 보상한 건축물의 철거비용은 원칙적으로 사업시행자가 부담한다.",
"시장 등은 인도할 자가 고의·과실 없이 의무를 이행할 수 없을 때 사업시행자 청구로 인도를 대행한다.",
"시장 등은 사업시행자가 과실 없이 이전의무자를 알 수 없을 때 사업시행자 청구로 이전을 대행한다.",
"인도·이전을 대행하는 경우 그 비용은 시장 등(지방자치단체)이 부담한다."],a:4,
ex:"인도·이전 대행 비용은 <b>사업시행자</b>가 부담합니다. ⑤가 옳지 않은 지문."},
{id:"t11",subject:"토지보상법규",o:11,q:"재결의 실효와 손실보상에 관련된 내용이다. 옳지 않은 것은?",opt:[
"개시일까지 보상금을 지급·공탁하지 않으면 해당 재결은 효력을 상실한다.",
"재결의 효력이 상실한 때는 사업시행자가 보상금을 지급하더라도 소유권을 취득하는 것은 아니다.",
"손실이 있음을 안 날부터 3년이 지났으면 손실보상을 청구할 수 없다.",
"손실보상은 사업시행자와 손실을 입은 자가 협의하여 결정한다.",
"협의가 성립되지 아니하면 토지소유자와 관계인은 관할 토지수용위원회에 재결을 신청할 수 있다."],a:4,
ex:"재결 실효로 인한 손실보상의 재결신청은 <b>사업시행자 또는 손실을 입은 자</b>가 관할 토지수용위원회에 하는 것으로, '토지소유자와 관계인'으로만 한정한 ⑤가 옳지 않습니다."},
{id:"t12",subject:"토지보상법규",o:12,q:"「토지보상법」상 손실보상의 원칙이 아닌 것은?",opt:[
"사업시행자 보상 원칙","개별보상 원칙","현금보상의 원칙","개인별 보상 원칙","사업시행 이익과의 상계금지 원칙"],a:1,

{id:"s20",subject:"토지보상법규",o:"정선 20",q:"토지보상법상 기간의 계산 방법, 통지, 송달, 서류의 발급 신청에 관한 설명 이 틀린 것은?",opt:[

{id:"s21",subject:"토지보상법규",o:"정선 21",q:"토지보상법상 통지 및 서류의 송달에 관한 내용으로 옳지 않은 것은?",opt:[
"통지는 서면으로 하여야 하나, 타인이 점유하는 토지에 출입하여 장애물의 제거 등을 하기 위한 사전 통지는 말로 할 수 있다.",
"서류의 송달은 해당 서류를 송달받을 자에게 교부하거나 우편법 시행규칙 제25조 제1 항 제6호 규정에 따른 특별송달 방법으로 할 수 있다.",
"송달받을 자를 알 수 없거나, 송달장소를 알 수 없거나, 외국에서 대사, 공사, 영사 등 에 의한 촉탁 송달<민사소송법 제191조> 이 불가능할 경우는 공시송달을 할 수 있다.",
"공시송달을 하려는 자는 토지 등의 소재지를 관할하는 시장·군수·구청장에게 해당 서류를 송부하여야 한다.",
"시장·군수·구청장은 송부된 서류를 받았을 때는 그 서류를 해당 지방자치단체의 공보에 게재하여야 한다."],a:4,

{id:"s22",subject:"토지보상법규",o:"정선 22",q:"다음은 토지보상법상 토지 취득 절차를 나열한 것이다. 그 절차를 순서대로 바르게 나열한 것은? 가. 보상 계획 공고 및 열람 나. 협의 및 계약 체결 다. 토지수용 라. 이의신청 및 행정소송 마. 사업의 준비 바. 토지조서 작성 사. 협의보상액 결정",opt:[

{id:"s23",subject:"토지보상법규",o:"정선 23",q:"다음은 토지보상법상 사업 준비를 위한 출입의 허가 등에 관한 설명이다. 틀린 것은?",opt:[
"사업 시행자는 공익사업을 준비하기 위하여 타인이 점유하는 토지에 출입하여 측량을 하거나 조사할 수 있다.",
"사업 시행자는 측량이나 조사를 하려면 사업의 종류와 출입할 토지의 구역 및 기간을 정하여 특별자치도지사, 시장·군수·구청장의 허가를 받아야 한다. 다만, 사업 시행자 가 국가일 때는 그 사업을 시행할 관계 중앙행정기관의 장이 특별자치도지사, 시장 등 에게 통지하고, 사업 시행자가 특별시·광역시·도일 때는 특별시장·광역시장·도지사 가 시장 등에게 통지하여야 한다. <특별자치도, 시·군·자치구가 사업 시행자인 경우 는 제외>",
"타인이 점유하는 토지에 출입하려는 자는 출입하려는 날의 3일 전까지 그 일시 및 장소를 특별자치도지사, 시장 등에게 통지하여야 한다.",
"해가 뜨기 전이나 해가 진 후에는 토지 점유자의 승낙 없이 그 주거나 경계표·담장 등으로 둘러싸인 토지에 출입할 수 없다.",
"토지 점유자는 정당한 사유 없이 사업 시행자가 통지하고 출입·측량 또는 조사하는 행위를 방해하지 못한다."],a:2,
ex:"정답(가려낼 지문)은 ③번입니다 — 나머지 보기는 옳은 설명이고 ③번만 법령·판례와 다릅니다."},
{id:"s24",subject:"토지보상법규",o:"정선 24",q:"토지보상법에서 정한 공익사업 준비를 위한 타인 토지 출입권에 대해 잘못 설명한 것은?",opt:[
"사업의 종류, 출입할 토지의 구역, 기간을 정하여 시장 등의 허가를 받아야 한다.",
"시장 등이 출입의 허가를 하거나 중앙행정기관의 장 또는 시·도지사의 통지를 받은 때는 사업 시행자, 사업의 종류와 출입할 토지의 구역 및 기간을 공고하고 이를 토지 점유자에게 통지하여야 한다.",
"타인이 점유하는 토지에 출입하고자 하는 자는 출입하고자 하는 날의 5일 전까지 그 일시 및 장소를 시장 등에게 통지하여야 하고, 시장 등은 지체 없이 이를 공고하고 그 토지 소유자에게 통지하여야 한다.",
"일출전, 일몰후에는 점유자의 승낙 없이 주거나 담장 등으로 둘러싸인 타인의 토지에 출입할 수 없다.",
"토지 점유자는 정당한 사유가 있으면 사업 시행자의 토지에 출입을 제한 및 거부를 할 수 있다."],a:2,
ex:"정답은 ③번입니다."},
{id:"s25",subject:"토지보상법규",o:"정선 25",q:"공익사업 준비를 위한 타인 토지 출입의 내용으로 옳지 않은 것은?",opt:[

"일출 전이나 일몰 후에는 토지 점유자의 승낙 없이 그 주거나 경계표·담 등으로 둘러 싸인 토지에 출입할 수 없다."],a:2,

{id:"s26",subject:"토지보상법규",o:"정선 26",q:"공익사업 준비를 위한 타인 토지 출입에 따라 장애물 제거 등의 내용으로서 옳지 않은 것은?",opt:[
"사업 시행자는 타인이 점유하는 토지에 출입하여 측량 또는 조사를 할 때 장애물 제거 등을 하여야 할 부득이한 사유가 있는 경우, 그 소유자·점유자의 동의를 받아야 한다.",

"장애물 제거 등을 하려는 자는 장애물 제거 등을 하려는 날의 3일 전까지 그 소유자· 점유자에게 통지하여야 한다.",

{id:"s27",subject:"토지보상법규",o:"정선 27",q:"다음은 토지보상법상 토지 및 물건 조서 작성에 관한 설명이다. 틀린 것은?",opt:[
"토지 및 물건 조서는 공익사업을 위해 수용 또는 사용할 필요가 있는 토지 및 그 토지 위에 있는 물건의 내용을 기재하는 사업 시행자가 작성하는 문서이다.",
"사업인정을 받은 사업 시행자는 토지조서 및 물건 조서를 작성하여 서명 또는 날인을 하고 토지소유자와 관계인의 서명 또는 날인을 받아야 한다.",
"사업인정 이전에 협의가 성립되지 아니하여 사업인정 받은 사업으로서 토지 및 물건 조서의 내용에 변동이 없는 때는 토지 및 물건 조서를 작성하지 아니하여도 된다.",
"적법하게 작성된 토지조서와 물건 조서는 이의 부기 된 사항을 제외하고 진실에 합치 되는 것으로 간주한다.",
"토지조서 작성에 절차상 하자가 있다고 하여 그것이 곧 수용재결이나 그에 대한 이의 재결의 효력에 영향을 미치는 것은 아니라 할 것이다."],a:3,
ex:"정답(가려낼 지문)은 ④번입니다 — 나머지 보기는 옳은 설명이고 ④번만 법령·판례와 다릅니다."},
{id:"s30",subject:"토지보상법규",o:"정선 30",q:"다음은 토지보상법에서 정한 토지조서 및 물건 조서에 대한 설명이다. 틀리게 설명한 것은?",opt:[
"토지조서 및 물건 조서라고 함은 협의 또는 수용 대상 토지와 그 토지에 있는 물건의 내용을 사업 시행자가 일정한 절차를 거쳐 작성하는 문서이다.",
"조서의 작성은 협의 또는 수용의 목적이 된 토지 등의 내용에 관한 당사자 간의 분쟁 예방 및 토지수용위원회의 심리와 재결 등의 절차를 용이하고 신속·원활하게 하는데 의의가 있다.",
"토지조서 및 물건 조서는 사업 시행자가 작성하여 서명·날인하는 것으로서, 토지 소유자, 관계인의 서명 또는 날인을 받아야 한다. 단, 토지소유자 및 관계인이 서명 또는 날인을 거부하거나 할 수 없는 경우, 사업 시행자는 토지조서 및 물건 조서에 그 사유를 기재하여야 한다.",
"적법한 절차에 따라 조서가 작성되었다면 사업 시행자는 토지소유자 및 관계인의 의사 에 불구하고 조서의 계속성의 효력에 의하여 수용 절차를 중단 없이 진행할 수 있다.",
"토지수용위원회는 토지조서와 물건 조서에 부여된 확정력을 전제로 하여 심리하고 수용 또는 사용의 재결을 하게 되므로 변경 또는 수정할 수 없다."],a:4,
ex:"정답은 ⑤번입니다."},
{id:"s31",subject:"토지보상법규",o:"정선 31",q:"다음은 토지보상법상 \"보상 계획의 열람 등\"에 관한 내용으로 틀린 것은?",opt:[
"사업 시행자는 토지조서와 물건 조서를 작성하였을 때는 공익사업의 개요, 토지조서 및 물건 조서의 내용과 보상의 시기·방법 및 절차 등이 포함된 보상 계획을 전국을 보급 지역으로 하는 일간신문에 공고하고, 토지소유자 및 관계인에게 각각 통지하여야 하며, 일정한 경우를 제외하고는 특별자치도지사, 시장·군수 또는 구청장에게도 통지하여야 한다. 다만, 토지소유자와 관계인이 50인 이하인 경우는 공고를 생략할 수 있다.",
"사업 시행자는 공고나 통지를 하였을 때는 그 내용을 14일 이상 일반인이 열람할 수 있도록 하여야 한다.",
"사업 지역이 둘 이상의 시, 군, 구에 걸쳐 있거나 사업 시행자가 행정청이 아닌 경우는 해당 특별자치도지사, 시장·군수 또는 구청장에게도 그 사본을 송부하여 열람을 의뢰 하여야 한다.",
"공고되거나 통지된 토지조서·물건 조서의 내용에 대하여 이의가 있는 토지소유자 또는 관계인은 열람 기간 이내에 사업 시행자에게 서면으로 이의를 제기할 수 있다.",

{id:"y18r10",subject:"부동산관계법규",diff:2,o:"2018 10",q:"국유재산의 용도폐지에 대한 내용으로서 틀린 것은?",opt:[
"중앙관서의 장은 행정목적으로 사용되지 않게 되면 지체없이 용도를 폐지하여야 한다.",
"행정재산으로 사용 결정한 날부터 5년이 지날 때까지 사용되지 않으면 지체없이 용도를 폐지하여야 한다.",
"일반재산 개발을 위해 필요하면 지체없이 용도를 폐지하여야 한다.",

"일반재산도 특히 필요하면 그 용도를 폐지하여야 한다."],a:4,
ex:"일반재산은 '용도' 개념이 없어 용도폐지 대상이 아닙니다. ⑤가 틀린 지문."},
{id:"y18r11",subject:"부동산관계법규",diff:2,o:"2018 11",q:"국유재산 중 공익사업에 필요한 일반재산을 사업시행자에게 처분하는 경우의 처분가격 결정 방법은?",opt:[

{id:"y18r12",subject:"부동산관계법규",diff:2,o:"2018 12",q:"「건축법」상 건축물의 건축과 관련된 내용 중 옳지 않은 것은?",opt:[
"'건축물'이란 토지에 정착하는 공작물 중 지붕이 있고 기둥 또는 벽이 있는 것을 말한다.",
"개축이나 재축에는 종전 규모 범위 내에서 다시 축조하는 것이 포함된다.",
"특정 토지의 대지면적과 토지면적은 다를 수도 있다.",
"대지면적은 일반적으로 건축물대장을 통하여 확인할 수 있다.",
"지목 '대'와 「건축법」상 대지는 개념이 동일하다."],a:4,
ex:"「건축법」상 대지는 각 필지로 나눈 토지를 말하며, 지목 '대'와 개념이 동일하지 않습니다. ⑤가 옳지 않은 지문."},
{id:"y18r13",subject:"부동산관계법규",diff:2,o:"2018 13",q:"「건축법」상 건축면적과 관련된 내용 중 옳지 않은 것은?",opt:[
"건축면적은 건축물 1층 부분의 바닥면적으로 산정하는 것이다.",
"건축면적은 외벽(외벽이 없으면 외곽 기둥) 중심선으로 둘러싸인 수평투영면적으로 한다.",
"처마·차양 등이 외벽 중심선으로부터 1m 이상 돌출되면 돌출 끝에서 일정 거리 후퇴한 선으로 산정한다.",
"한옥의 경우 그 수평거리는 2m 이하 범위에서 외벽 중심선까지의 거리를 말한다.",
"건축면적은 건폐율 산정에 활용된다."],a:0,
ex:"건축면적은 '1층 바닥면적'이 아니라 건축물 전체의 수평투영면적(외벽 중심선 기준)으로 판단합니다. ①이 옳지 않은 지문."},
{id:"y18r14",subject:"부동산관계법규",diff:2,o:"2018 14",q:"건축물의 연면적에 대한 설명으로서 틀린 것은?",opt:[
"연면적은 각 층 바닥면적의 합계로 하며 용적률 산정의 기준이 된다.",
"지하층은 건축물의 연면적에 포함되지 않는다.",
"지상층 주차용(부속용도)으로 쓰는 면적은 용적률 산정 시 연면적에서 제외한다.",
"초고층·준초고층 건축물의 피난안전구역 면적도 용적률 산정 시 연면적에서 제외한다.",
"용적률 산정에서 제외되는 연면적 부분은 건축주에게 유용한 공간이 된다."],a:1,
ex:"지하층은 연면적에 '포함'되며, 다만 '용적률 산정에서만' 제외됩니다. ②가 틀린 지문."},
{id:"y18r15",subject:"부동산관계법규",diff:2,o:"2018 15",q:"건축물의 건축과 관련된 내용 중 가장 옳지 않은 것은?",opt:[
"건축허가 대상 건축물을 건축하려는 자는 사전결정을 신청할 수 있다.",
"건축허가권자는 특별자치시장·특별자치도지사 또는 시장·군수·구청장이 원칙이다.",
"허가받은 날부터 일정 기간 내 착수하지 않아도 익일에 자동 취소되는 것은 아니며 허가권자가 취소하여야 한다.",
"정당한 사유가 있으면 1년 범위에서 착수기간을 연장할 수 있고, 연장은 1회에 한정된다.",
"착공신고 전 경매·공매 등으로 대지 소유권을 상실한 때부터 6개월 경과 후 착수 불가 판단 시에도 취소사유가 된다."],a:3,
ex:"정답표는 착수기간 연장이 '1회에 한정되는 것은 아니'라고 봅니다(연장하더라도 1년 범위에서 착공하라는 취지). ④가 옳지 않은 지문."},
{id:"y18r16",subject:"부동산관계법규",diff:2,o:"2018 16",q:"폭 3m의 통과도로에 접한 가로 10m·세로 20m 대지의 「건축법」상 대지면적은? (소요너비 미달 도로의 건축선 후퇴 반영)",opt:[
"200제곱미터",

"180제곱미터",
"185제곱미터"],a:2,
ex:"소요너비(4m) 미달 도로는 중심선에서 2m 후퇴하므로 도로쪽 0.5m가 대지면적에서 제외됩니다. (20×10)−(20×0.5)=190㎡. ③."},
{id:"y18r17",subject:"부동산관계법규",diff:2,o:"2018 17",q:"허가권자가 주변 환경 부적합을 이유로 건축위원회 심의를 거쳐 건축허가를 하지 아니할 수 있는 건축물의 용도는?",opt:[

{id:"y18r18",subject:"부동산관계법규",diff:2,o:"2018 18",q:"「건축법」상 도로에 대한 설명으로서 틀린 것은?",opt:[
"보행·자동차 통행이 가능해야 하며 자동차 통행이 불가능한 계단식 도로는 「건축법」상 도로가 될 수 없다.",
"원칙적으로 너비 4m 이상이어야 한다.",
"건축허가·신고 시 시·도지사 또는 시장·군수·구청장이 위치를 지정·공고한 도로도 해당될 수 있다.",
"허가권자가 위치를 지정·공고하려면 이해관계인의 동의를 받아야 하며 예외가 있다.",
"건축물의 대지는 원칙적으로 2m 이상이 도로(자동차전용도로 제외)에 접해야 한다."],a:0,
ex:"지형적 조건 등으로 시장 등이 지정·공고하는 너비 3m 이상(막다른 10m 미만은 2m 이상) 도로도 될 수 있어, 계단식 도로를 일률 배제한 ①이 틀린 지문."},
{id:"y18r19",subject:"부동산관계법규",diff:2,o:"2018 19",q:"「공간정보의 구축 및 관리 등에 관한 법률」상 지번에 대한 내용 중 옳지 않은 것은?",opt:[
"지번은 아라비아숫자로 표기한다.",
"지번은 본번과 부번으로 구성하며 부번이 없는 경우도 있다.",
"본번과 부번 사이에 '-' 표시로 연결하며 '의'라고 읽는다.",
"지목이 임야인 토지의 지번은 숫자 앞에 '산'자를 붙인다.",
"지번은 북서에서 남동으로 순차적으로 부여함이 원칙이다."],a:3,

{id:"y18r20",subject:"부동산관계법규",diff:2,o:"2018 20",q:"「부동산 가격공시에 관한 법률」상 공시가격 중 감정평가업자의 감정평가 기준으로 활용되는 것은?",opt:[

{id:"y18t1",subject:"토지보상법규",diff:2,o:"2018 1",q:"「토지보상법」상 '관계인'에 대한 설명 중 옳지 않은 것은?",opt:[
"취득·사용할 토지에 지상권·지역권·전세권·저당권·사용대차·임대차 등 소유권 외의 권리를 가진 자나 그 물건에 관하여 권리를 가진 자를 말한다.",
"다만, 사업인정 고시가 된 후에 권리를 취득한 자는 모두 관계인에 포함되지 아니한다.",
"판례상 매수대금을 완납했으나 소유권이전등기를 마치지 아니한 자도 관계인에 해당된다.",
"판례상 토지와 별도로 취득·사용 대상이 되는 정착물에 대한 실질적 처분권을 가진 자도 관계인에 포함된다.",
"판례상 가처분 권리자는 소유자나 관계인으로 해석할 수 없다."],a:1,
ex:"사업인정 고시 후 권리취득자라도 '기존 권리를 승계한 자'는 관계인에 포함됩니다. '모두 포함되지 아니한다'고 한 ②가 옳지 않은 지문."},
{id:"y18t2",subject:"토지보상법규",diff:2,o:"2018 2",q:"「토지보상법」 적용 대상에 정확히 해당되지 않는 것은?",opt:[

{id:"y18t5",subject:"토지보상법규",diff:2,o:"2018 5",q:"「토지보상법령」상 통지 및 서류의 송달에 대한 내용으로서 옳지 않은 것은?",opt:[
"통지는 서면으로 하나, 타인 점유 토지 출입·장해물 제거의 사전 통지는 말로 할 수 있다.",
"서류 송달은 교부하거나 「우편법 시행규칙」에 따른 특별송달로 할 수 있다.",
"송달받을 자·장소를 알 수 없거나 외국 촉탁송달이 불가능하면 공시송달 할 수 있다.",

{id:"y18t6",subject:"토지보상법규",diff:2,o:"2018 6",q:"공익사업 준비를 위한 타인 토지 출입에 대한 내용으로서 옳지 않은 것은?",opt:[
"사업시행자는 측량·조사를 하려면 사업 종류·구역·기간을 정하여 시장 등의 허가를 받아야 한다.",
"사업시행자가 국가·시도일 때에는 중앙행정기관의 장·시도지사가 시장 등에게 통지한다.",
"출입·측량·조사로 발생하는 손실은 출입 행위를 하기 전에 보상(사전보상)하여야 한다.",
"출입하려는 자는 출입하려는 날의 5일 전까지 일시·장소를 시장 등에게 통지하여야 한다.",
"일출 전·일몰 후에는 점유자 승낙 없이 주거나 담 등으로 둘러싸인 토지에 출입할 수 없다."],a:2,

<script>
/* ============================== ENGINE ============================== */
const SUBJECTS = ["민법","부동산관계법규","토지보상법규"];
const SUBJ_COLOR = {"민법":"#3A5BA0","부동산관계법규":"#8A6D1F","토지보상법규":"#2E7D57"};
const BOX_INTERVALS = [1,2,4,8,16]; // days for box 1..5
const NUM = ["①","②","③","④","⑤"];
const STORE_KEY = "bosang:progress:v3";
const mem = {};
const store = {
  async get(k){
    try{ const v=localStorage.getItem(k); if(v!=null) return JSON.parse(v); }catch(e){}
    try{ if(window.storage){ const r=await window.storage.get(k); if(r&&r.value) return JSON.parse(r.value); } }catch(e){}
    return mem[k]||null;
  },
  async set(k,v){
    mem[k]=v;
    let saved=false;
    try{ localStorage.setItem(k, JSON.stringify(v)); saved=true; }catch(e){}
    if(!saved){ try{ if(window.storage){ await window.storage.set(k, JSON.stringify(v)); } }catch(e){} }
  }
};
const todayNum = ()=>Math.floor(Date.now()/86400000);

let P = null; // progress state
function blankProgress(){
  const cards={};
  BANK.forEach(q=>cards[q.id]={box:0,seen:0,correct:0,wrong:0,lastDay:null,dueDay:0});
  return {cards, totalAnswered:0, totalCorrect:0, studyDays:[], version:3};
}
async function loadProgress(){
  const saved = await store.get(STORE_KEY);
  if(saved && saved.cards){
    // ensure all bank ids exist
    BANK.forEach(q=>{ if(!saved.cards[q.id]) saved.cards[q.id]={box:0,seen:0,correct:0,wrong:0,lastDay:null,dueDay:0}; });
    P = saved;
  } else { P = blankProgress(); }
}
async function saveProgress(){ await store.set(STORE_KEY, P); }

function markStudied(){
  const d=todayNum();
  if(!P.studyDays.includes(d)) P.studyDays.push(d);
}
function currentStreak(){
  if(!P.studyDays.length) return 0;
  const set=new Set(P.studyDays); let d=todayNum();
  if(!set.has(d) && !set.has(d-1)) return 0;
  let start = set.has(d)?d:d-1, s=0;
  while(set.has(start)){s++;start--;}
  return s;
}
function applyResult(id, ok){
  const c=P.cards[id]; c.seen++;
  P.totalAnswered++;
  if(ok){ c.correct++; P.totalCorrect++; c.box=Math.min(5,(c.box||0)+1); }
  else { c.wrong++; c.box=1; }
  c.lastDay=todayNum();
  c.dueDay=todayNum()+BOX_INTERVALS[Math.max(0,c.box-1)];
}
function masteryPct(){ // weighted: box5 fully mastered
  let sum=0; BANK.forEach(q=>sum+=(P.cards[q.id].box||0)); return Math.round((sum/(BANK.length*5))*100);
}
function subjMastery(s){
  const qs=BANK.filter(q=>q.subject===s); let sum=0; qs.forEach(q=>sum+=(P.cards[q.id].box||0));
  return {pct:Math.round((sum/(qs.length*5))*100), n:qs.length, mastered:qs.filter(q=>P.cards[q.id].box>=5).length, seen:qs.filter(q=>P.cards[q.id].seen>0).length};
}

function dfilter(a){ return filterDiff? a.filter(q=>(q.diff||2)===filterDiff):a; }
function diffMastery(d){ const qs=BANK.filter(q=>(q.diff||2)===d); if(!qs.length)return {pct:0,n:0,mastered:0}; let s=0; qs.forEach(q=>s+=(P.cards[q.id].box||0)); return {pct:Math.round(s/(qs.length*5)*100), n:qs.length, mastered:qs.filter(q=>P.cards[q.id].box>=5).length}; }
function dueCards(){ const t=todayNum(); return BANK.filter(q=>{const c=P.cards[q.id]; return c.seen===0 || c.dueDay<=t;}); }
function weakCards(){ return BANK.filter(q=>{const c=P.cards[q.id]; return c.box<=2 || c.wrong>c.correct;}); }
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildQueue(mode, subject){
  let pool;
  if(mode==='review'){ pool=dfilter(dueCards()); if(randomMode) pool=shuffle(pool); else pool.sort((a,b)=>(P.cards[a.id].box)-(P.cards[b.id].box)); pool=pool.slice(0,20); }
  else if(mode==='weak'){ pool=dfilter(weakCards()); pool=randomMode?shuffle(pool).slice(0,Math.min(20,pool.length)):weightedPick(pool, Math.min(20,pool.length||1)); }
  else if(mode==='practice'){ let p=dfilter(subject==='전체'?BANK:BANK.filter(q=>q.subject===subject)); pool=randomMode?shuffle(p).slice(0,Math.min(15,p.length)):weightedPick(p, Math.min(15,p.length)); }
  else if(mode==='exam'){ let p=dfilter(BANK.filter(q=>q.subject===subject)); pool=shuffle(p).slice(0,25); }
  return pool.map(q=>q.id);
}
function toggleRandom(){ randomMode=!randomMode; renderDash(); }
function weightedPick(pool, n){
  // weight = 6 - box (weaker => more likely), sample without replacement
  let items=pool.map(q=>({q,w:6-(P.cards[q.id].box||0)})); let out=[];
  for(let k=0;k<n && items.length;k++){
    let tot=items.reduce((s,i)=>s+i.w,0), r=Math.random()*tot, acc=0, pick=0;
    for(let i=0;i<items.length;i++){acc+=items[i].w; if(r<=acc){pick=i;break;}}
    out.push(items[pick].q); items.splice(pick,1);
  }
  return out;
}

function answer(i){
  const id=session.queue[session.idx], q=BANK.find(x=>x.id===id);
  if(session.answers[id]!==undefined) return;
  session.answers[id]=i;
  const before=P.cards[id].box, ok=i===q.a;
  applyResult(id, ok);
  if(ok){session.correctCount++; if(P.cards[id].box>before)session.levelUp++;}
  else { if(P.cards[id].box<before)session.levelDown++; }
  markStudied(); saveProgress();
  renderStudy();
}

  });
  markStudied(); saveProgress();
  const total=session.queue.length, score=Math.round(correct/total*100);
  const rows=session.queue.map((id,n)=>{
    const q=BANK.find(x=>x.id===id), ch=session.answers[id], ok=ch===q.a;
    return `<div style="padding:12px 0;border-bottom:1px solid var(--line-2)">
      <div style="display:flex;gap:8px;align-items:flex-start">
        <span class="mono" style="color:${ok?'var(--correct)':'var(--wrong)'};font-weight:800;flex:none">${ok?'✓':'✕'} ${n+1}.</span>
        <div style="flex:1">
          <div style="font-size:13.5px;font-weight:600;line-height:1.5;word-break:keep-all">${q.q}</div>
          <div style="font-size:12.5px;color:var(--muted);margin-top:5px">내 답 ${NUM[ch]} · 정답 <b style="color:var(--correct)">${NUM[q.a]}</b></div>
          <div style="font-size:12.5px;color:var(--ink-2);margin-top:4px;line-height:1.5;word-break:keep-all">${q.ex}</div>
        </div>
      </div></div>`;
  }).join('');
  const col=score>=80?'var(--correct)':score>=60?'var(--gold)':'var(--seal)';
  root.innerHTML = topbar() + `
  <div class="card"><div class="summary" style="padding-bottom:8px">
    <div class="eyebrow">채점 결과 · ${session.subject}</div>
    <h2 style="margin-top:10px;font-size:40px;color:${col}">${correct*4}<span style="font-size:18px;color:var(--muted)"> / 100점</span></h2>
    <div class="sline">${total}문항 중 ${correct}문항 정답 · ${score}%</div>
  </div>
  <div style="margin-top:6px"><div class="eyebrow" style="margin-bottom:6px">문항별 해설</div>${rows}</div>
  <div class="actionbar" style="justify-content:center;margin-top:20px">
    <button class="btn" onclick="quitSession()">지적도로 돌아가기</button>
  </div></div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

/* -------- keyboard -------- */
document.addEventListener('keydown',e=>{
  if(!session) return;
  if(session.examMode){
    const id=session.queue[session.idx];
    if(e.key>='1'&&e.key<='5') examPick(+e.key-1);
    else if(e.key==='Enter'){ if(session.answers[id]!==undefined) examNext(); }
    return;
  }
  const id=session.queue[session.idx];
  const answered=session.answers[id]!==undefined;
  if(!answered && e.key>='1'&&e.key<='5') answer(+e.key-1);
  else if(answered && (e.key==='Enter'||e.key===' ')){ e.preventDefault(); next(); }
});

function confirmReset(){
  if(confirm('모든 학습 기록(숙련도·통계)을 초기화합니다. 계속할까요?')){
    P=blankProgress(); saveProgress(); session=null; render();
  }
}

/* -------- boot -------- */
(async()=>{ await loadProgress(); render(); })();
</script>

/* PWA: 서비스워커 등록 (오프라인 지원). 상대경로라 GitHub Pages 프로젝트 페이지에서도 동작 */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('service-worker.js').catch(function(){});
  });
